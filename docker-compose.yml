services:
  hashit:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - data:/data/uploads
      - db:/data/db
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    env_file: .env
    entrypoint: /bin/sh
    command: >
      -c "
      if [ -n \"$$TUNNEL_TOKEN\" ]; then
        echo 'Starting Cloudflare Named Tunnel...';
        exec cloudflared tunnel --no-autoupdate run;
      else
        echo 'Starting Cloudflare Quick Tunnel (Free Random Domain)...';
        exec cloudflared tunnel --no-autoupdate run --url http://hashit:8000;
      fi
      "

volumes:
  data:
  db:
