services:
  hashit:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - data:/data/uploads
      - db:/data/db
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    entrypoint: ["cloudflared", "tunnel", "--no-autoupdate"]
    # DEFAULT: Spins up a free Cloudflare Quick Tunnel (random subdomain).
    command: ["--url", "http://hashit:8000"]

    # CUSTOM DOMAIN / NAMED TUNNEL CONFIGURATION:
    # command: ["run"]
    # environment:
    #   - TUNNEL_TOKEN=${TUNNEL_TOKEN}

volumes:
  data:
  db:
