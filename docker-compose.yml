services:
  hashit:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - data:/data/uploads
      - db:/data/db
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # DEFAULT: Spins up a free Cloudflare Quick Tunnel (random subdomain).
    # To switch to a custom domain (Named Tunnel), comment the command line below
    # and uncomment the command & environment block for the Named Tunnel.
    command: tunnel --no-autoupdate run --url http://hashit:8000

    # CUSTOM DOMAIN / NAMED TUNNEL CONFIGURATION:
    # command: tunnel --no-autoupdate run
    # environment:
    #   - TUNNEL_TOKEN=${TUNNEL_TOKEN}

volumes:
  data:
  db:
