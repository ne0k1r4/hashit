# hashit — nginx config
# place in /etc/nginx/sites-available/hashit
# symlink: ln -s /etc/nginx/sites-available/hashit /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # security
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # hide server info
    server_tokens off;
    more_clear_headers Server;

    # file upload limit — match HASHIT_MAX_SIZE_MB
    client_max_body_size 520M;
    client_body_timeout  300s;

    # proxy timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    # gzip
    gzip on;
    gzip_types text/plain application/json text/html text/css application/javascript;
    gzip_min_length 1024;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # don't buffer uploads
        proxy_request_buffering off;
    }

    # cache static assets
    location /static/ {
        proxy_pass       http://127.0.0.1:8000;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # health check — no logging
    location /health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
